<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Task 2 - Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Image Gallery</h1>
    <h3>by Tayyab Ahmed Janjua</h3>

    <div id="gallery-box">
        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800&q=80" alt="Mountain" class="gallery-img active" id="img0">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80" alt="Beach" class="gallery-img" id="img1">
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=800&q=80" alt="Forest" class="gallery-img" id="img2">
        <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=800&q=80" alt="City" class="gallery-img" id="img3">
        <img src="https://images.unsplash.com/photo-1473580044384-7ba9967e16a0?auto=format&fit=crop&w=800&q=80" alt="Desert" class="gallery-img" id="img4">

        <p id="caption-text">Photo 1 - Mountain View</p>

        <div id="btn-area">
            <button onclick="prevImage()">&#8592; Previous</button>
            <span id="slide-num">1 / 5</span>
            <button onclick="nextImage()">Next &#8594;</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
