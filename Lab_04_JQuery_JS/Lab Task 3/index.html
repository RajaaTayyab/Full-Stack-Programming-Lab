<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Task 3 - Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Registration Form</h1>
    <h3>by Tayyab Ahmed Janjua</h3>

    <div id="form-container">

        <!-- success message, hidden at first -->
        <div id="success-msg" style="display:none;">
            &#10003; Form submitted successfully! Welcome!
        </div>

        <div id="my-form">

            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" placeholder="Enter your name" onblur="validateName()">
                <span class="error-msg" id="name-error"></span>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="text" id="email" placeholder="Enter your email" onblur="validateEmail()">
                <span class="error-msg" id="email-error"></span>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Min 6 characters" onblur="validatePassword()">
                <span class="error-msg" id="password-error"></span>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="text" id="phone" placeholder="e.g. 03001234567" onblur="validatePhone()">
                <span class="error-msg" id="phone-error"></span>
            </div>

            <button onclick="submitForm()">Submit</button>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
